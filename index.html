<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scary Movie 6</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body>
  <header class="hero">
    <nav>
      <div class="logo">
        Scary Movie <span>6</span>
      </div>
      <div class="menu">
        <a href="#">Home</a>
        <a href="#trailer">Trailer</a>
        <a href="#cast">Cast</a>
      </div>
    </nav>

    <div class="hero-center">
      <h1>WHAAAZUUUP</h1>
    </div>
  </header>

  <section class="ghost-section">
    <img src="tt.png" class="ghost" alt="Scary Movie logo">
  </section>

  <section class="trailer" id="trailer">
    <h2>OFFICIAL TRAILER</h2>
    <div class="video">
      <iframe
        width="800"
        height="450"
        src="https://www.youtube-nocookie.com/embed/0fZ58S-7QP0"
        title="Scary Movie 6 trailer"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen
      ></iframe>
    </div>
    <p class="tagline">
      The horror comedy is about to get ridiculous.
    </p>
  </section>

  <section class="cast" id="cast">
    <h2>MEET THE IDIOTS</h2>
    <div class="cast-grid">
      <div class="person">
        <img src="wawmetrownetrzed.jpg" alt="Kim">
        <h3>KIM</h3>
      </div>

      <div class="person">
        <img src="concept.jpg" alt="Michael">
        <h3>MICHAEL</h3>
      </div>

      <div class="person">
        <img src="legal-logos.png" alt="Lila">
        <h3>LILA</h3>
      </div>
    </div>
  </section>

  <footer>
    Scary Movie 6 - Official Movie Page
  </footer>
</body>
</html>
