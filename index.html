<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scary Movie 🎬</title>
  <style>
    /* Reset and basic styling */
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html { height:100%; font-family: Arial, sans-serif; }

    /* Background image / poster */
    body {
      background: url('poster.jpg') no-repeat center center/cover;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    /* Overlay for readability */
    body::before {
      content: "";
      position: absolute;
      top:0; left:0;
      width:100%; height:100%;
      background: rgba(0,0,0,0.6);
      z-index:0;
    }

    header, main {
      position: relative;
      z-index:1;
    }

    h1 {
      font-size: 4em;
      margin-bottom: 0.3em;
      text-shadow: 2px 2px 10px black;
    }

    p {
      font-size: 1.5em;
      margin-bottom: 1em;
      max-width: 800px;
    }

    button {
      padding: 15px 30px;
      font-size: 1.2em;
      background-color: red;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
      color: white;
    }

    button:hover {
      background-color: darkred;
    }

    video {
      margin-top: 30px;
      max-width: 90%;
      height: auto;
      border: 2px solid white;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<header>
  <h1>Scary Movie</h1>
  <p>A thrilling horror movie that will keep you on the edge of your seat. Dare to watch?</p>
  <button onclick="document.getElementById('trailer').scrollIntoView({behavior:'smooth'})">Watch Trailer</button>
</header>

<main id="trailer">
  <video controls>
    <source src="trailer.mp4" type="video/mp4">
    Your browser does not support video playback.
  </video>
</main>

</body>
</html>
